                          - generic [ref=f19e148]:
                            - paragraph [ref=f19e149]: How to use this page during the Summit
                            - list [ref=f19e150]:
                              - listitem [ref=f19e151]:
                                - paragraph [ref=f19e152]: This page is your team’s shared workspace and final report-out page. It captures your group’s process and thinking throughout the Summit and will be used to share your work with others.
                              - listitem [ref=f19e153]:
                                - paragraph [ref=f19e154]: Use this page as your team’s working record during the Summit and your final report-out.
                              - listitem [ref=f19e155]:
                                - paragraph [ref=f19e156]: "The Summit has several different goals and thus you will use the page differently each day: Day 1 is for alignment, Day 2 is for building one useful thing, and Day 3 is for synthesis and report- out."
                              - listitem [ref=f19e157]:
                                - paragraph [ref=f19e158]: Look for the green buttons to indicate what you need to edit.
                              - listitem [ref=f19e159]:
                                - paragraph [ref=f19e160]: Megaphones 📣 indicate which items you will be presenting during the end-of-day report-outs.
                              - listitem [ref=f19e161]:
                                - paragraph [ref=f19e162]: Only the items with megaphones will be visible when you hit the 'Summit Report Out' button.
                              - listitem [ref=f19e163]:
                                - paragraph [ref=f19e164]: If you turn off 'Instructions' then you will only see the page content for public display.
