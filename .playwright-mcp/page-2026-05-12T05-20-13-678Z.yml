                                - paragraph [ref=f17e154]: Use this page as your team’s working record during the Summit and your final report-out.
                              - listitem [ref=f17e155]:
                                - paragraph [ref=f17e156]: "The Summit has several different goals and thus you will use the page differently each day: Day 1 is for alignment, Day 2 is for building one useful thing, and Day 3 is for synthesis and report- out."
