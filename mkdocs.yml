# Page tree
nav:
  - Public Front Page: index.md
  - Instructions:
      - Day 1 — Meet Your Team and Define Your Project: instructions/day1.md
      - Day 2 — Build, Explore, and Apply New Skills: instructions/day2.md
      - Day 3 — Synthesize, Polish, and Share: instructions/day3.md
  - AI for Sustainability:
      - Defining AI: ai-for-sustainability/defining-ai.md
      - Defining Sustainability: ai-for-sustainability/defining-sustainability.md
      - What Does It Cost?: ai-for-sustainability/what-does-it-cost.md
  - Specialty Tracks:
      - LLM: https://cu-esiil.github.io/LLM_lesson_exemplar/
      - Digital Twins: specialty-tracks/digital-twins.md
      - Earth Embeddings: https://center-for-effective-global-action-cega.github.io/MOSAIKS-Training-Manual/en/index.html
      - Causal Inference: specialty-tracks/causal-inference.md
  - Manuals:
      - Link to GitHub: instructions/link-to-github.md
      - Git/GitHub Widget in JupyterLab: instructions/push-to-github.md
      - Save to persistent storage: instructions/save-to-persistent-storage.md
  - Storage:
      - Project code: https://github.com/CU-ESIIL/Project_group_OASIS/tree/main/code
      - Project documentation: https://github.com/CU-ESIIL/Project_group_OASIS/tree/main/documentation
      - Shared persistent storage: "https://de.cyverse.org/data/ds/iplant/home/shared/esiil/Innovation_summit/Group_1?type=folder&resourceId=1993057e-8e90-11f0-b0fa-90e2ba675364"
  - Orientation:
      - Summit slides: orientation/slides.md
      - ESIIL training: orientation/esiil_training.md
      - Code of conduct: orientation/code-of-conduct.md
      - Participant agreement: orientation/participant_agreement.md

not_in_nav: |
  data.md
  stickers.md
  instructions.md
  project_template.md
  assets/cyverse_basics/README.md
  assets/docker_basics/README.md
  assets/template/README.md
  orientation/art_gallery.md
  orientation/cyverse_basics.md
  orientation/docker_basics.md
  orientation/markdown_basics.md
  people/README.md
  people/template.md
  people/jane-doe.md
  people/john-smith.md

# Configuration
theme:
  highlightjs: true
  name: material
  custom_dir: docs/overrides
  font: false
  logo: 'assets/oasis_logo.png'
  favicon: 'assets/esiil_content/favicon.ico'
  # setting features for the navigation tab
  features:
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
  # Default values, taken from mkdocs_theme.yml
  language: en
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# Options
extra:
  homepage: https://cu-esiil.github.io/home/
  social:
    - icon: fontawesome/brands/github
    # link: https://github.com/cu-esiil/

extra_css:
  - stylesheets/tokens.css
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mode-toggle.js

hooks:
  - hooks.py

plugins:
    - search
    - mkdocstrings
    - git-revision-date
    - mkdocs-jupyter:
          include_source: True
          ignore_h1_titles: True
markdown_extensions:
  - admonition
  - toc:
      toc_depth: 2
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.snippets:
      base_path:
        - docs

validation:
  omitted_files: ignore
